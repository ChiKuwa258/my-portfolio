<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My Portfolio</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <div class="scroll-bar" id="scrollBar"></div>

        <div id="loader">
                <h1>Loading...</h1>
        </div>

        <div class="particles"></div>

        <header>
                <h1>My Portfolio</h1>
                <nav>
                <a href="about.html">About</a>
                <a href="#works">Works</a>
                <a href="#contact">Contact</a>
                </nav>
        </header>

        <section class="hero">
                <h1 id="typing"></h1>
                <p>Web Design / Front-End</p>

                <a href="#works" class="btn">
                    View Works
                </a>
        </section>

        <section id="about">
                <h2>About</h2>
                <p>HTML/CSSを学習中です。</p>
        </section>

        <section id="works">
                <h2>Works</h2>
            <div class="works-container">
            
            <div class="card hidden">
                <img src="images/PC.jpg" alt="作品1">

                <h3>作品1</h3>
                <p>ポートフォリオサイト</p>

                <a href="javascript:void(0)"
                    class="btn"
                    data-title="ポートフォリオサイト"
                    data-text="HTML/CSSで制作したポートフォリオサイトです。">

                    view More
                </a>
                </div>

            <div class="card hidden">
                <img src="images/カフェ.jpg" alt="作品2">

                <h3>作品2</h3>
                <p>カフェLP</p>

                <a href="javascript:void(0)"
                    class="btn"
                    data-title="カフェLP"
                    data-text="カフェのランディングページを制作しました。">

                    view More
                </a>
                </div>

            <div class="card hidden">
                <img src="images/game.jpg" alt="作品3">

                <h3>作品3</h3>
                <p>ゲームUI</p>

                <a href="javascript:void(0)"
                    class="btn"
                    data-title="ゲームUI"
                    data-text="ゲーム風UIデザインを制作しました。">

                    view More
                </a>
                </div>

            </div>

        </section>

        <section id="contact">
                <h2>Contact</h2>
                <p>example@gmail.com</p>
        </section>

        <div class="modal" id="modal">

            <div class="modal-content">

            <span class="close">&times;</span>

            <h2 id="modal-title">作品詳細</h2>

            <p id="modal-text"></p>

            </div>

            </div>

        <script>
            const modal = document.getElementById("modal");

            const buttons = document.querySelectorAll(".card .btn");

            const close = document.querySelector(".close");

            const modalTitle = document.getElementById("modal-title");

            const modalText = document.getElementById("modal-text");



            // モーダル表示
            buttons.forEach(button => {

                button.addEventListener("click", () => {

                    modal.style.display = "flex";

                    modalTitle.textContent =
                    button.dataset.title;

                    modalText.textContent =
                    button.dataset.text;

                });

            });



            // モーダル閉じる
            close.addEventListener("click", () => {

                modal.style.display = "none";

            });



            // スクロール演出
            const targets = document.querySelectorAll(".hidden");

            function showElements() {

                targets.forEach(target => {

                const targetTop =
                target.getBoundingClientRect().top;

                if(targetTop < window.innerHeight - 100){

                target.classList.add("show");

                    }

                });

            }

            window.addEventListener("scroll", showElements);

            showElements();

            const text = "Creative Developer";

            const typing = document.getElementById("typing");

            let index = 0;

            function typeText(){

                if(index < text.length){

                    typing.textContent += text.charAt(index);

                index++;

                setTimeout(typeText, 100);
                }

            }

            typeText();

            const cards = document.querySelectorAll(".card");

                    cards.forEach(card => {

                card.addEventListener("mousemove", (e) => {

            const rect = card.getBoundingClientRect();

            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const centerX = rect.width / 2;
            const centerY = rect.height / 2;

            const rotateX = -(y - centerY) / 15;
            const rotateY = (x - centerX) / 15;

                card.style.transform =
                `
                    rotateX(${rotateX}deg)
                    rotateY(${rotateY}deg)
                    scale(1.03)
                `;
                });

                card.addEventListener("mouseleave", () => {

                card.style.transform =
                    "rotateX(0) rotateY(0) scale(1)";
                });

            });

            const light = document.querySelector(".cursor-light");
                document.addEventListener("mousemove", (e) => {

                light.style.left = e.clientX + "px";
                light.style.top = e.clientY + "px";

            });

            const header = document.querySelector("header");

                window.addEventListener("scroll", () => {

            if(window.scrollY > 50){

                header.classList.add("scrolled");

            }else{

                header.classList.remove("scrolled");

                    }

            });

            // ローディング解除
                window.addEventListener("load", () => {

            const loader =
                document.getElementById("loader");

            setTimeout(() => {

                 loader.classList.add("hide");

                }, 1500);

            });

            // スクロール進行バー
            const scrollBar =
                document.getElementById("scrollBar");

                window.addEventListener("scroll", () => {

            const scrollTop =
                document.documentElement.scrollTop;

            const scrollHeight =
                document.documentElement.scrollHeight -
                document.documentElement.clientHeight;

            const progress =
                    (scrollTop / scrollHeight) * 100;

                scrollBar.style.width =
                progress + "%";

            });

            // ヒーロー背景パララックス
            const hero =
                document.querySelector(".hero");

                window.addEventListener("scroll", () => {

            const scrollY = window.scrollY;

                hero.style.backgroundPositionY =
                scrollY * 0.4 + "px";
            });

        </script>

        <div class="cursor-light"></div>

    </body>
</html>
